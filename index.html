<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Homenagem Especial</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- AVISO DE ROTAÇÃO (PURO CSS) -->
    <div id="rotate-warning">
        <div class="text-center">
            <img src="https://cdn-icons-png.flaticon.com/512/575/575454.png" width="60" class="rotate-icon mb-3">
            <p class="fw-bold px-4">Por favor, gire o seu celular para a horizontal para ver a surpresa!</p>
        </div>
    </div>

    <!-- Overlay Inicial (Opaco/Translúcido) -->
    <div id="overlay">
        <div id="container-overlay-content" class="text-center text-white p-4 z-index-top">
            <h1 id="boas-vindas" class="game-font mb-4 text-uppercase">Carregando...</h1>
            <button class="btn btn-warning btn-lg px-5 shadow-lg rounded-pill fw-bold" onclick="iniciarExperiencia()">ABRIR PRESENTE 🎁</button>
        </div>
    </div>

    <!-- Tela Principal -->
    <main id="main-container">
        <!-- Tutorial/Instrução no Topo -->
        <div class="container-instrucao">
            <div class="caixa-dialogo">
                <p id="texto-instrucao"></p>
            </div>
        </div>

        <!-- Onde os Macaquinhos/Bíblias/Corações aparecem -->
        <div id="hotspots-container"></div>

        <!-- Player de Áudio -->
        <audio id="musica-fundo" loop>
            <source id="audio-source" src="" type="audio/mpeg">
        </audio>
    </main>

    <!-- Modal Mensagem Individual -->
    <div class="modal fade" id="mensagemModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center game-modal shadow-lg">
                <div class="modal-body p-4">
                    <p id="texto-mensagem" class="fs-4 text-dark fw-bold"></p>
                    <button type="button" class="btn btn-primary mt-2 rounded-pill px-4 fw-bold" data-bs-dismiss="modal">PRÓXIMO!</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Final (A Grande Homenagem) -->
    <div class="modal fade" id="modalFinal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content final-vintage text-center shadow-lg">
                <div class="modal-body p-4">
                    <h2 class="mb-3 display-6 fw-bold">Feliz Dia das Mulheres! 🌹</h2>
                    <div id="texto-final"></div>
                    <button type="button" class="btn btn-danger mt-3 rounded-pill px-5 fw-bold" data-bs-dismiss="modal">COM CARINHO ❤️</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
